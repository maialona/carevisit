services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: carevisit
      POSTGRES_PASSWORD: carevisit
      POSTGRES_DB: carevisit
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carevisit"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    environment:
      - PORT=8080
      - DATABASE_URL=postgresql+asyncpg://carevisit:carevisit@db/carevisit
      - SECRET_KEY=dev-secret-key-12345
      - FRONTEND_URL=http://localhost,http://localhost:5173,http://127.0.0.1
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8080/api
    ports:
      - "80:8080"
    depends_on:
      - backend

volumes:
  pgdata:
